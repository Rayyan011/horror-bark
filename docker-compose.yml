services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports: 
      - "8080:80"
    networks:
      - internal
    volumes:
      - ./application/:/var/www/html/
      - ./logs/nginx:/var/log/nginx/
    container_name: horrorbark-nginx
  php:
    build:
      context: .
      dockerfile: php/Dockerfile
    networks:
      - internal
    volumes:
      - ./application/:/var/www/html/
      - ./logs/php.log:/var/log/fpm-php.www.log
    container_name: horrorbark-php
    expose:
      - "9000"
  mysql:
    container_name: horrorbark-db
    restart: always
    image: mysql:latest
    platform: linux/x86_64
    ports:
     - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 'root'
      MYSQL_DATABASE: "horrorbark"
      MYSQL_USER: 'db_user'
      MYSQL_PASSWORD: 'db_password'
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - internal
networks:
  internal:
    driver: bridge

volumes:
  db-data:
