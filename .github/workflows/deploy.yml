name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -Eeuo pipefail
            cd /opt/horror-bark

            deploy_succeeded=0

            finish_deploy() {
              if [ "$deploy_succeeded" -eq 1 ]; then
                docker exec horrorbark-php php artisan up || true
              else
                echo "Deployment failed; application remains in maintenance mode."
              fi
            }

            trap finish_deploy EXIT

            docker exec horrorbark-php php artisan down --retry=60 || true

            # Pull latest code (keep production docker-compose.yml)
            git stash --include-untracked || true
            git pull origin main
            git checkout stash -- docker-compose.yml 2>/dev/null || true
            git stash drop 2>/dev/null || true

            docker exec horrorbark-php php artisan optimize:clear || true

            # Build and restart containers while the app is in maintenance mode.
            docker compose build
            docker compose up -d

            # Install PHP dependencies
            docker exec horrorbark-php composer install --no-dev --optimize-autoloader

            # Build frontend assets
            docker run --rm -v /opt/horror-bark/application:/app -w /app node:20-alpine sh -c 'npm ci && npm run build'

            # Clear Laravel caches after the new asset manifest is written.
            docker exec horrorbark-php php artisan optimize:clear

            # Run migrations and optimize
            docker exec horrorbark-php php artisan migrate --force
            docker exec horrorbark-php chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache
            docker exec horrorbark-php php artisan optimize

            # Reload app workers so every request picks up the same Vite manifest and built assets.
            docker compose restart php nginx
            sleep 3

            # Restart Traefik only after the new release is ready.
            docker restart coolify-proxy
            sleep 3

            deploy_succeeded=1
            echo "Deploy complete!"
