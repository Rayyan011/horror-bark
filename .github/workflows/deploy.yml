name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -Eeuo pipefail
            cd /opt/horror-bark

            deploy_succeeded=0

            finish_deploy() {
              if [ "$deploy_succeeded" -eq 1 ]; then
                docker exec horrorbark-php php artisan up || true
              else
                echo "Deployment failed; application remains in maintenance mode."
              fi
            }

            trap finish_deploy EXIT

            docker exec horrorbark-php php artisan down --retry=60 || true

            # Pull latest code (keep production docker-compose.yml)
            git stash --include-untracked || true
            git pull origin main
            git checkout stash -- docker-compose.yml 2>/dev/null || true
            git stash drop 2>/dev/null || true

            # Clear host-side compiled artifacts before containers come back up.
            find application/storage/framework/views -type f -delete || true
            find application/bootstrap/cache -maxdepth 1 -type f ! -name '.gitignore' -delete || true

            docker exec horrorbark-php php artisan optimize:clear || true

            # Stop the current compose stack first, then remove any lingering
            # Horror Bark app containers from older naming patterns so the
            # proxy cannot keep routing traffic to an outdated runtime.
            docker compose down --remove-orphans || true
            docker ps -aq --format '{{.ID}} {{.Names}}' | awk '$2 ~ /^horror-?bark-(nginx|php)(-[0-9]+)?$/ { print $1 }' | xargs -r docker rm -f
            docker ps -q | while read -r container_id; do
              labels="$(docker inspect -f '{{ json .Config.Labels }}' "$container_id" 2>/dev/null || true)"
              if printf '%s' "$labels" | grep -qi 'horrorbark\.rayyanameez\.com'; then
                docker rm -f "$container_id" || true
              fi
            done

            # Build and restart containers while the app is in maintenance mode.
            docker compose build
            docker compose up -d --force-recreate --remove-orphans

            # Install PHP dependencies
            docker exec horrorbark-php composer install --no-dev --optimize-autoloader

            # Build frontend assets
            docker run --rm -v /opt/horror-bark/application:/app -w /app node:20-alpine sh -c 'npm ci && npm run build'

            # Clear Laravel caches after the new asset manifest is written.
            docker exec horrorbark-php php artisan optimize:clear

            # Run migrations, refresh the seeded world catalog, and optimize
            docker exec horrorbark-php php artisan migrate --force
            docker exec horrorbark-php php artisan db:seed --class=Database\\Seeders\\HorrorBarkWorldSeeder --force
            docker exec horrorbark-php chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache
            docker exec horrorbark-php php artisan optimize

            # Fully restart PHP while the app is still down so no stale worker
            # can keep an old Vite manifest cached in memory.
            docker compose restart php
            sleep 5

            # Refresh the edge proxy after old app containers have been purged
            # so it only routes traffic to the current Horror Bark backend.
            docker restart coolify-proxy || true
            sleep 5

            deploy_succeeded=1
            echo "Deploy complete!"
